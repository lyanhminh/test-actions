name: Test QA
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request Number'
        required: true
      repo:
        description: 'Repo Name'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Dummy Test
        run: |
          echo "Running QA Tests..."
          sleep 5
          echo "✅ QA Tests Passed"

      - name: Trigger Integration Apply
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.event.inputs.repo }}/issues/${{ github.event.inputs.pr_number }}/comments \
            -d "{\"body\": \"atlantis apply -p integration\"}" > /dev/null
