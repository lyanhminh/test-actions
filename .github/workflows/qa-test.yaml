name: "QA Quality Gate"

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: 'Application image tag'
        required: true
        type: string
      module_ref:
        description: 'Git ref (tag/branch/SHA) from infrastructure module project'
        required: false
        type: string
        default: 'main'
  workflow_call:
    inputs:
      build_tag:
        type: string
      module_ref:
        required: false
        type: string
        default: 'main'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-qa:
    name: "Deploy Ephemeral QA"
    uses: ./.github/workflows/tf-base.yaml
    secrets: inherit
    with:
      directory: ./qa
      environment: qa
      workspace: qa-${{ github.run_id }}
      build_tag: ${{ inputs.build_tag }}
      operation: apply-direct
      role_arn: arn:aws:iam::123456789:role/github-actions-qa

  smoke-tests:
    name: "Run Smoke Tests"
    needs: deploy-qa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Smoke Tests
        run: ./automated-tests/endpoint-checker.sh qa

  cleanup-qa:
    name: "Cleanup QA"
    needs: [deploy-qa, smoke-tests]
    if: success() || failure() # TODO: change to always()
    uses: ./.github/workflows/tf-base.yaml
    secrets: inherit
    with:
      directory: ./qa
      environment: qa
      workspace: qa-${{ github.run_id }}
      operation: destroy
      role_arn: arn:aws:iam::123456789:role/github-actions-qa
