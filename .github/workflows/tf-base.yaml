name: "Terraform Base"

on:
  workflow_call:
    inputs:
      directory:
        required: true
        type: string
      environment:
        required: true
        type: string
      build_tag:
        required: true
        type: string
        default: "sha:123"
      operation: # "plan-only", "apply", or "destroy"
        required: true
        type: string
      role_arn:
        required: true
        type: string
    secrets:
      GH_PAT: # demo only, replace with GitHub App short-lived credentials in production
        required: true

jobs:
  run-terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Git for Private Modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

          #      - name: Configure AWS Credentials
          #        uses: aws-actions/configure-aws-credentials@v4
          #        with:
          #          role-to-assume: ${{ inputs.role_arn }}
          #          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="build_tag=${{ inputs.build_tag }}" \
            -out=tfplan

      - name: Upload Plan Artifact
        if: inputs.operation == 'plan-only'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.environment }}-tfplan
          path: ${{ inputs.directory }}/tfplan

      - name: Terraform Action
        run: |
          if [ "${{ inputs.operation }}" == "plan-only" ]; then
            terraform plan -out=tfplan -var="build_tag=${{ inputs.build_tag }}"
          elif [ "${{ inputs.operation }}" == "apply" ]; then
            terraform apply -auto-approve -var="build_tag=${{ inputs.build_tag }}"
          elif [ "${{ inputs.operation }}" == "destroy" ]; then
            terraform destroy -auto-approve -var="build_tag=${{ inputs.build_tag }}"
          fi
