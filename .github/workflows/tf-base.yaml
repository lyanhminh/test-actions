name: "Terraform Worker"
on:
  workflow_call:
    inputs:
      directory: { required: true, type: string }
      environment: { required: true, type: string }
      build_tag: { required: false, type: string, default: "" }
      operation: { required: true, type: string } # apply, destroy, plan-only
      workspace: { required: false, type: string, default: "default" }
      role_arn: { required: true, type: string }
    outputs:
      plan_id:
        value: ${{ jobs.run.outputs.plan_id }}

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: actions/checkout@v4
        #      - uses: aws-actions/configure-aws-credentials@v4
        #        with:
        #          role-to-assume: ${{ inputs.role_arn }}
        #          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Workspace Selection
        run: |
          terraform workspace select ${{ inputs.workspace }} || terraform workspace new ${{ inputs.workspace }}

      - name: Terraform Plan
        if: inputs.operation == 'plan-only' || inputs.operation == 'apply'
        run: |
          VAR_FILE="${{ github.workspace }}/tfvars/${{ inputs.environment }}.tfvars"
          ARGS="-input=false -no-color -var-file=$VAR_FILE"
          
          if [ -n "${{ inputs.build_tag }}" ]; then
            ARGS="$ARGS -var='build_tag=${{ inputs.build_tag }}'"
          fi

          terraform plan $ARGS -out=tfplan

      - name: Upload Plan Artifact
        if: inputs.operation == 'plan-only'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.environment }}-${{ inputs.workspace }}-tfplan
          path: ${{ inputs.directory }}/tfplan
          retention-days: 1

      - name: Download Plan Artifact
        if: inputs.operation == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.environment }}-${{ inputs.workspace }}-tfplan
          path: ${{ inputs.directory }}

      - name: Terraform Apply
        if: inputs.operation == 'apply'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.operation == 'destroy'
        run: |
          VAR_FILE="${{ github.workspace }}/tfvars/${{ inputs.environment }}.tfvars"
          ARGS="-input=false -no-color -var-file=$VAR_FILE"
          if [ -n "${{ inputs.build_tag }}" ]; then
             ARGS="$ARGS -var='build_tag=${{ inputs.build_tag }}'"
          fi
          terraform destroy -auto-approve $ARGS
