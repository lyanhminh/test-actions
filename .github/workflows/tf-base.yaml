name: "Terraform Worker"

permissions:
  contents: read
  id-token: write

on:
  workflow_call:
    inputs:
      directory: { required: true, type: string }
      environment: { required: true, type: string }
      build_tag: { required: false, type: string, default: "" }
      operation: { required: true, type: string } # apply, destroy, plan-only
      workspace: { required: false, type: string, default: "default" }
      role_arn: { required: true, type: string }
    outputs:
      plan_id:
        value: ${{ jobs.run.outputs.plan_id }}

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Git for Terraform
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
        
      #      - uses: aws-actions/configure-aws-credentials@v4
      #        with:
      #          role-to-assume: ${{ inputs.role_arn }}
      #          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Workspace Selection
        run: |
          terraform workspace select ${{ inputs.workspace }} 2>/dev/null || terraform workspace new ${{ inputs.workspace }}

      - name: Terraform Plan
        env:
          TF_INPUT: "false"
          TF_IN_AUTOMATION: "true"
          BUILD_TAG: ${{ inputs.build_tag }}  
        if: inputs.operation == 'plan-only' || inputs.operation == 'apply'
        run: |
          VAR_FILE="${{ github.workspace }}/tfvars/${{ inputs.environment }}.tfvars"

          ARGS=(
            -input=false
            -no-color
            -var-file="$VAR_FILE"
          )

          if [ -n "$BUILD_TAG" ]; then
            ARGS+=(-var "build_tag=$BUILD_TAG")
          fi

          terraform plan -out=tfplan "${ARGS[@]}"

      - name: Upload Plan Artifact
        if: inputs.operation == 'plan-only'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.environment }}-${{ inputs.workspace }}-tfplan
          path: ${{ inputs.directory }}/tfplan
          retention-days: 1

      - name: Download Plan Artifact
        if: inputs.operation == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.environment }}-${{ inputs.workspace }}-tfplan
          path: ${{ inputs.directory }}

      - name: Terraform Apply
        if: inputs.operation == 'apply'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform Destroy
        env:
          TF_INPUT: "false"
          TF_IN_AUTOMATION: "true"
          BUILD_TAG: ${{ inputs.build_tag }}  
        if: inputs.operation == 'destroy'
        run: |
          VAR_FILE="${{ github.workspace }}/tfvars/${{ inputs.environment }}.tfvars"

          ARGS=(
            -input=false
            -no-color
            -var-file="$VAR_FILE"
          )

          if [ -n "${BUILD_TAG}" ]; then
            ARGS+=(-var "build_tag=$BUILD_TAG")
          fi

          terraform destroy -auto-approve "${ARGS[@]}"


      - name: Terraform Apply Direct
        if: inputs.operation == 'apply-direct'
        env:
          TF_INPUT: "false"
          TF_IN_AUTOMATION: "true"
          BUILD_TAG: ${{ inputs.build_tag }}
        run: |
          VAR_FILE="${{ github.workspace }}/tfvars/${{ inputs.environment }}.tfvars"

          ARGS=(
            -input=false
            -no-color
            -var-file="$VAR_FILE"
          )

          if [ -n "$BUILD_TAG" ]; then
            ARGS+=(-var "build_tag=$BUILD_TAG")
          fi

          terraform apply -auto-approve "${ARGS[@]}"
