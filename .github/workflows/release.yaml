name: Release Orchestration

on:
  workflow_dispatch:
    inputs:
      build_tag:
        required: true
        default: 'latest'

jobs:
  qa-deploy:
    name: "QA: Deploy"
    uses: ./.github/workflows/terraform-base.yaml
    with:
      directory: ./qa
      environment: qa
      operation: apply
      build_tag: ${{ github.event.inputs.build_tag }}
      role_arn: arn:aws:iam::123456789:role/github-actions-qa

  qa-test:
    name: "QA: Run Smoke Tests"
    needs: qa-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Smoke Tests
        run: |
          chmod +x ./automated-tests/endpoint-checker.sh
          ./automated-tests/endpoint-checker.sh qa

  qa-destroy:
    name: "QA: Destroy"
    needs: [qa-deploy, qa-test]
    if: always()
    uses: ./.github/workflows/terraform-base.yaml
    with:
      directory: ./qa
      environment: qa
      operation: destroy
      build_tag: ${{ github.event.inputs.build_tag }}
      role_arn: arn:aws:iam::123456789:role/github-actions-qa

  prod-plan:
    needs: qa-test
    uses: ./.github/workflows/terraform-base.yaml
    with:
      directory: ./production
      environment: prod
      build_tag: ${{ github.event.inputs.build_tag }}
      operation: plan-only
      role_arn: arn:aws:iam::123456789:role/github-actions-prod-plan

  prod-apply:
    needs: prod-plan
    environment: production
    uses: ./.github/workflows/terraform-base.yaml
    with:
      directory: ./production
      environment: production
      build_tag: ${{ github.event.inputs.build_tag }}
      operation: apply
      role_arn: arn:aws:iam::123456789:role/github-actions-prod-apply
